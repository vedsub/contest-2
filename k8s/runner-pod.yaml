apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: runner
  namespace: workflow-runner
spec:
  serviceName: runner
  replicas: 7
  selector:
    matchLabels:
      app: runner
  template:
    metadata:
      labels:
        app: runner
    spec:
      containers:
        - name: runner
          image: busybox:1.36
          command: ["sh", "-c", "sleep infinity"]
