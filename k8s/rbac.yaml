apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: workflow-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workflow-runner-pod-access
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: workflow-runner-pod-access
subjects:
  - kind: ServiceAccount
    name: default
    namespace: workflow-runner
roleRef:
  kind: ClusterRole
  name: workflow-runner-pod-access
  apiGroup: rbac.authorization.k8s.io
